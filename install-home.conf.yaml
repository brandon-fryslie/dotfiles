- defaults:
    link:
      relink: true
      force: true

- create:
    - ~/.codex

- link:
    # Home profile overrides (these take precedence over global)
    ~/.mackup.cfg: config/mackup.home.cfg
    ~/.rad-plugins: config/rad-plugins.home
    ~/.zshrc: config/zshrc.home
    ~/.config/tmux: config/tmux
    ~/.config/codex: config/codex
    ~/.config/iterm2: config/iterm2   # iTerm2 session-restore -> cwd + tmux-join (see config/iterm2/README.md)

- shell:
    - description: Link IntelliJ live-plugins
      command: scripts/link-intellij-live-plugins.sh
      stdout: true
      stderr: true
    - description: Wire iTerm2 session-restore trigger (Send text at start)
      command: config/iterm2/apply-initial-text.sh
      stdout: true
      stderr: true
