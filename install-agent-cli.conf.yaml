- defaults:
    link:
      relink: true
      force: true

- create:
    - ~/.claude
    - ~/.claude/plugins

- link:
    ~/.claude/agents: config/claude/agents
    ~/.claude/agents-disabled: config/claude/agents-disabled
    ~/.claude/commands: config/claude/commands
    ~/.claude/commands-disabled: config/claude/commands-disabled
    ~/.claude/personal-synced: config/claude/personal-synced
    ~/.claude/skills: config/claude/skills
    ~/.claude/CLAUDE.md: config/claude/CLAUDE.md
    ~/.claude/settings.json: config/claude/settings.json

- create:
    - ~/.gemini
    - ~/.copilot
    - ~/.copilot/skills
    - ~/.codex
    - ~/.agents
    - ~/.agents/skills

- link:
    ~/.gemini/GEMINI.md: config/gemini/GEMINI.md
    ~/.gemini/skills: config/gemini/skills
    ~/.copilot/copilot-instructions.md: config/copilot/copilot-instructions.md
    ~/.copilot/skills/claude-plugin-sync: config/copilot/skills/claude-plugin-sync
    ~/.codex/skills: config/codex/skills
    ~/.agents/skills/brainstorming: config/agents/skills/brainstorming
    ~/.agents/skills/canonicalize-docs: config/agents/skills/canonicalize-docs
    ~/.agents/skills/code-refactor: config/agents/skills/code-refactor
    ~/.agents/skills/firecrawl: config/agents/skills/firecrawl
    ~/.agents/skills/firecrawl-agent: config/agents/skills/firecrawl-agent
    ~/.agents/skills/firecrawl-browser: config/agents/skills/firecrawl-browser
    ~/.agents/skills/firecrawl-crawl: config/agents/skills/firecrawl-crawl
    ~/.agents/skills/firecrawl-download: config/agents/skills/firecrawl-download
    ~/.agents/skills/firecrawl-map: config/agents/skills/firecrawl-map
    ~/.agents/skills/firecrawl-scrape: config/agents/skills/firecrawl-scrape
    ~/.agents/skills/firecrawl-search: config/agents/skills/firecrawl-search
    ~/.agents/skills/oscilla-naga-dsl-reference: config/agents/skills/oscilla-naga-dsl-reference
    ~/.agents/skills/prompt-scaffold: config/agents/skills/prompt-scaffold
