# GENERATED by agent-code-review-setup/install.sh — do not edit by hand.
# This file is a derived copy of the template embedded in install.sh; the
# installer reconverges it on every run and will overwrite local edits.
# To change the workflow, change the template and re-run the installer.
name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

# One review at a time per PR: a new push supersedes the in-flight review of
# the old SHA rather than racing it to post comments.
concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Code Review
        uses: brandon-fryslie/coding-agent-review@v1
        with:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
