# Previously: a custom global hook on `after-select-pane` that called
# tmux-auto-mouse.sh to toggle mouse mode based on the focused pane's app.
# Replaced by the nhdaly/tmux-better-mouse-mode plugin (see tmux.conf).
#
# `-ug` is required to unset a *global* hook — `-u` alone would target session
# scope, where no hook was ever set, and silently no-op. Keeping the explicit
# unset (rather than just deleting the file) defends against the hook surviving
# a stale tmux server restart or out-of-order config sourcing.

set-hook -ug after-select-pane
