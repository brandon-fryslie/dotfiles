%hidden TMUX_CONFIG_DIR="$HOME/.config/tmux"

# Shell configuration - ensure login shells with full config
set -g default-shell "/bin/zsh"
set -g default-command "/bin/zsh -l"

# Fix terminal colors and features
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Shows abbreviated action with icons
source-file $TMUX_CONFIG_DIR/conf.d/tmux-command-echo.conf

# Some awesome commands set up specifically to use with Blink + iPad
source-file $TMUX_CONFIG_DIR/conf.d/super-commands.conf

# A chart to help me remember kb shortcuts.  Bring up with prefix ?
source-file $TMUX_CONFIG_DIR/conf.d/help-chart.conf

# Configure mouse to only kinda suck on Mac (way better than default)
source-file $TMUX_CONFIG_DIR/conf.d/mac-mouse.conf

# Auto-toggle mouse mode based on pane application's mouse reporting
# source-file $TMUX_CONFIG_DIR/conf.d/auto-mouse-toggle.conf

# Set terminal title to session name (for kitty tab titles)
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar styling (minimal)
# Note: status-left and status-right are overridden by command-echo option
set -g status-style 'bg=black fg=white'

# Tmux Plugin Manager 
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Auto-save tmux state
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
# Capture pane scrollback + in-flight output on every continuum save.
# Without this, only session/window/pane topology is persisted — pane
# contents and REPL/agent state are lost on any server restart.
set -g @resurrect-capture-pane-contents 'on'
# Restart long-running agents/REPLs inside panes on restore. Tilde prefix
# means resurrect will match the command anywhere in the pane's running
# process tree (important for claude, which runs via node).
set -g @resurrect-processes '"~claude" "~codex" "~npx claude" "~node claude" python ipython node'
# Note: status-right is handled by tmux-powerline (see ~/.config/tmux-powerline/themes/custom.sh)
# The tmux_continuum_status segment displays continuum info in the powerline

# Tmux Powerline
# set -g @plugin 'erikw/tmux-powerline'

# Tmux better-mouse-mode
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Bootstrap TPM if missing
run-shell '[ ! -d ~/.config/tmux/plugins/tpm ] && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'

run-shell '~/.config/tmux/plugins/tpm/bin/install_plugins && touch ~/.config/tmux/plugins/.last_install'

# Run tmux plugin manager
run-shell 'PATH=/opt/homebrew/bin:/opt/homebrew/sbin:/Users/bmf/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin ~/.config/tmux/plugins/tpm/tpm'

# Disable aggressive-resize (tmux-sensible enables it, so this must come after TPM)
setw -g aggressive-resize off

